services:
  hydrabase:
    image: ghcr.io/quixthe2nd/hydrabase
    container_name: hydrabase
    ports:
      - 4544:4544/tcp
      - 45455:45455/udp
    volumes:
      #- ./data:/app/data
      - /mnt/user/appdata/hydrabase/data:/app/data
    environment:
      PUID: 1000
      PGID: 1000
      DHT_PORT: 45455
      SERVER_PORT: 4544
      API_KEY: your_hex_16_key
      #EXTERNAL_IP: your.public.ip.here  # Override if auto-detection fails (CGNAT, offline)
      #SPOTIFY_CLIENT_ID: $SPOTIFY_CLIENT_ID
      #SPOTIFY_CLIENT_SECRET: $SPOTIFY_CLIENT_SECRET
      #USERNAME: A
